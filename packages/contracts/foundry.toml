[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
fs_permissions = [{ access = "read-write", path = "./" }]

[rpc_endpoints]
pharos = "${PHAROS_RPC_URL}"

[etherscan]
pharos = { key = "${PHAROS_EXPLORER_API_KEY}", url = "https://api-atlantic.pharosscan.xyz/api", chain = 688689 }

[fmt]
line_length = 120

[invariant]
runs = 64
depth = 100
fail_on_revert = false
